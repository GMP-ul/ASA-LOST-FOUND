<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Role - ASA Lost and Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="selection.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-container">
    <img src="Final logo.png" alt="ASA Logo" class="main-logo">
  </div>
  <div class="header-right">
    <a href="landing.html" class="nav-link">Home</a>
  </div>
</header>

<!-- MAIN -->
<main class="hero-section">
  <div class="container">

    <!-- Left: Hero Text -->
    <div class="hero-content">
      <h1 class="hero-title">Join Our Community<br><span>Choose Your Role</span></h1>
      <p class="hero-subtitle">
        To provide you with the best experience, please select whether you are
        currently a Student, a member of the CSU Staff, or a Visitor.
      </p>
    </div>

    <!-- Right: Card -->
    <div class="login-frame">
      <div class="login-card-replica">

        <h2 class="card-title">I AM A...</h2>

        <div class="role-selection-container">

          <a href="signupStud.html" class="role-link-wrapper">
            <button class="role-option-btn">
              <i class="fa-solid fa-user-graduate role-icon"></i>
              <span>STUDENT</span>
            </button>
          </a>

          <a href="signupStaff.html" class="role-link-wrapper">
            <button class="role-option-btn">
              <i class="fa-solid fa-user-tie role-icon"></i>
              <span>STAFF</span>
            </button>
          </a>

          <a href="signupVisitor.html" class="role-link-wrapper">
            <button class="role-option-btn">
              <i class="fa-solid fa-person-walking-luggage role-icon"></i>
              <span>VISITOR</span>
            </button>
          </a>

        </div>

        <p class="replica-footer">
          Already have an account? <a href="landing.html" class="sign-in-link">Login</a>
        </p>

      </div>
    </div>

  </div>
</main>

<footer class="bottom-bar"></footer>

</body>
</html>
