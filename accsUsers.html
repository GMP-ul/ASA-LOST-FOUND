<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - ASA Lost and Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="accsUsers.css">
</head>
<body>

<header>
  <a href="homepage.html" class="logo-link">
    <img src="Final logo.png" alt="ASA Lost and Found Logo" class="main-logo">
  </a>

  <nav class="header-nav">
    <a href="homepage.html" class="nav-item">
      <i class="fa-solid fa-table-cells-large"></i> Home
    </a>
    <a href="#" class="nav-item">
      <i class="fa-solid fa-magnifying-glass"></i> Lost Items
    </a>
    <a href="#" class="nav-item">
      <i class="fa-solid fa-magnifying-glass"></i> Found Items
    </a>
    <a href="#" class="nav-item">
      <i class="fa-solid fa-circle-plus"></i> Post Item
    </a>
  </nav>

  <div class="header-right">
    <i class="fa-regular fa-bell bell"></i>
    <div class="user-avatar">
      <i class="fa-solid fa-circle-user"></i>
    </div>
  </div>
</header>

<div class="main-container">
  <aside class="sidebar">
    <div class="sidebar-content">
      <h2 class="sidebar-category">Options</h2>
      <nav class="menu">
        <a href="dashboard.html" class="menu-item">Dashboard</a>
        <a href="accLost.html" class="menu-item">Lost Items</a>
        <a href="accFound.html" class="menu-item">Found Items</a>
        <a href="accClaim.html" class="menu-item">Pending Items</a>
        <a href="accClaimed.html" class="menu-item">Claimed items</a>
        <a href="accApproved.html" class="menu-item">Approved Items</a>
        <a href="accsUsers.html" class="menu-item active">Users</a>
        <a href="accUpdates.html" class="menu-item">Recently Updated</a>
        <a href="accLogs.html" class="menu-item">Reports / Logs</a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <a href="accInfo.html" class="menu-item">Settings</a>
      <a href="login.html" class="logout">Log Out</a>
    </div>
  </aside>

  <main class="content">
    <div class="content-header">
      <h1 class="page-title">USER MANAGEMENT</h1>
      
      <div class="table-actions">
        <div class="mini-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search users...">
        </div>
        <button class="list-btn"><i class="fa-solid fa-list-ul"></i></button>
      </div>
    </div>

    <!-- FILTER BAR - Updated Roles & Added Filter Button -->
    <div class="filter-bar">
      <div class="filter-item">
        <label>Account Role</label>
        <select>
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="staff">Staff</option>
          <option value="visitor">Visitor</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Account Status</label>
        <select>
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Registration Date</label>
        <input type="date">
      </div>

      <div class="filter-actions">
        <button class="filter-apply">Filter</button>
        <button class="filter-reset">Reset</button>
      </div>
    </div>

    <div class="table-card taller-table">
      <table class="user-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- Dynamic user rows will be injected here -->
        </tbody>
      </table>

      <div class="empty-state">
        <p>No users found in the system.</p>
      </div>
    </div>

    <div class="pagination">
      <a href="#" class="page-nav"><i class="fa-solid fa-arrow-left"></i> Prev</a>
      <a href="#" class="page-num active">1</a>
      <a href="#" class="page-num">2</a>
      <a href="#" class="page-num">3</a>
      <span class="dots">...</span>
      <a href="#" class="page-num">67</a>
      <a href="#" class="page-num">68</a>
      <a href="#" class="page-nav">Next <i class="fa-solid fa-arrow-right"></i></a>
    </div>
  </main>
</div>

</body>
</html>
